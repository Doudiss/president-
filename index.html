<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Race to 270 - V4</title>
<style>
:root{--bg:#08101f;--card:#141b31;--card2:#1c2540;--txt:#f5f7ff;--muted:#aeb7cf;--blue:#3b6eea;--green:#28b487;--red:#e05252;--gold:#e0b34f;--line:#2a3455}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#08101f,#12173a);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;padding:18px 14px 92px}h1{font-size:34px;margin:16px 0 6px}h2{font-size:24px;margin:0 0 12px}.sub{color:var(--muted);font-size:16px;line-height:1.35}.top{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.stat b{font-size:26px}.stat span{display:block;color:var(--muted);font-size:13px}.card{background:rgba(20,27,49,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 12px 30px rgba(0,0,0,.18)}button,select{border:0;border-radius:16px;padding:14px 16px;font-size:16px;font-weight:800;color:var(--txt);background:#2a3455}button.primary{background:var(--green)}button.blue{background:var(--blue)}button.red{background:var(--red)}button.gold{background:var(--gold);color:#151515}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{flex:1;min-width:150px;margin:4px 0}.tabs{position:fixed;bottom:0;left:0;right:0;background:#0c1225;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 10px 16px;z-index:20}.tab{padding:12px 4px;border-radius:16px;font-size:13px;background:#151b31}.tab.active{background:var(--blue)}.view{display:none}.view.active{display:block}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);margin:3px;font-size:13px}.bar{height:10px;background:#26304d;border-radius:999px;overflow:hidden}.fill{height:100%;background:var(--blue);width:50%}.news{border-left:4px solid var(--gold);padding-left:12px}.danger{border-left:4px solid var(--red)}.good{border-left:4px solid var(--green)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.state{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;margin:6px 0}.state b{font-size:15px}.tiny{font-size:12px;color:var(--muted)}.log{max-height:260px;overflow:auto}.log p{border-bottom:1px solid var(--line);padding-bottom:8px;color:#d6dcf0}.map{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.box{border-radius:9px;padding:9px 5px;text-align:center;font-size:11px;background:#333}.win{background:#235ec9}.lose{background:#9e3131}.tie{background:#555}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted)}.choice{width:100%;text-align:left;margin:5px 0;background:#202945}.locked{opacity:.45}.meter{display:flex;align-items:center;gap:8px}.meter span{min-width:92px;color:var(--muted);font-size:13px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}.modal .card{max-height:85vh;overflow:auto;width:100%;max-width:520px}.modal.show{display:flex}@media(max-width:390px){h1{font-size:30px}.stat b{font-size:22px}body{padding-left:10px;padding-right:10px}.btn{min-width:130px}}
</style>
</head>
<body>
<header><h1>Race to 270 🇺🇸 V4</h1><div class="sub">Actualités, électeurs, promesses, débats, scandales, fonds, IA adverse et nuit électorale.</div></header>
<div class="top"><div class="stat"><b id="turn">1/16</b><span>Tour</span></div><div class="stat"><b id="cash">120</b><span>Crédits</span></div><div class="stat"><b id="ap">10</b><span>Actions</span></div><div class="stat"><b id="poll">25%</b><span>Sondage</span></div></div>
<main>
<section id="home" class="view active"></section><section id="brief" class="view"></section><section id="program" class="view"></section><section id="campaign" class="view"></section><section id="polls" class="view"></section><section id="map" class="view"></section>
</main>
<nav class="tabs"><button class="tab active" onclick="show('home',this)">Accueil</button><button class="tab" onclick="show('brief',this)">Brief</button><button class="tab" onclick="show('program',this)">Programme</button><button class="tab" onclick="show('campaign',this)">Campagne</button><button class="tab" onclick="show('polls',this)">Sondages</button></nav>
<div id="modal" class="modal"><div class="card"><h2 id="mt"></h2><div id="mb"></div><div class="row"><button class="blue btn" onclick="closeModal()">Fermer</button></div></div></div>
<script>
const issues=['Économie','Santé','Sécurité','Immigration','Climat'];
const states=[['CA',54,'Climat','Santé',-10],['TX',40,'Immigration','Économie',8],['FL',30,'Immigration','Économie',2],['NY',28,'Santé','Climat',-8],['PA',19,'Économie','Santé',0],['IL',19,'Santé','Sécurité',-6],['OH',17,'Économie','Sécurité',2],['GA',16,'Économie','Immigration',1],['NC',16,'Économie','Sécurité',1],['MI',15,'Économie','Climat',0],['NJ',14,'Santé','Climat',-6],['VA',13,'Sécurité','Économie',-2],['WA',12,'Climat','Santé',-7],['AZ',11,'Immigration','Climat',0],['MA',11,'Santé','Climat',-9],['TN',11,'Sécurité','Immigration',8],['IN',11,'Économie','Sécurité',7],['MD',10,'Santé','Sécurité',-8],['MO',10,'Sécurité','Économie',6],['WI',10,'Économie','Santé',0],['CO',10,'Climat','Économie',-3],['MN',10,'Santé','Économie',-2],['SC',9,'Sécurité','Immigration',7],['AL',9,'Sécurité','Immigration',10],['LA',8,'Économie','Sécurité',6],['KY',8,'Économie','Sécurité',8],['OR',8,'Climat','Santé',-6],['OK',7,'Énergie','Sécurité',10],['CT',7,'Santé','Économie',-6],['IA',6,'Économie','Santé',2],['NV',6,'Économie','Immigration',0],['AR',6,'Sécurité','Économie',9],['MS',6,'Sécurité','Économie',9],['KS',6,'Économie','Sécurité',7],['UT',6,'Économie','Immigration',6],['NM',5,'Immigration','Climat',-3],['NE',5,'Économie','Sécurité',6],['WV',4,'Économie','Énergie',12],['ID',4,'Immigration','Économie',10],['HI',4,'Climat','Santé',-9],['NH',4,'Économie','Santé',0],['ME',4,'Santé','Climat',-2],['RI',4,'Santé','Climat',-7],['MT',4,'Économie','Immigration',6],['DE',3,'Santé','Économie',-5],['SD',3,'Économie','Sécurité',9],['ND',3,'Économie','Énergie',10],['AK',3,'Énergie','Immigration',8],['VT',3,'Climat','Santé',-10],['WY',3,'Énergie','Sécurité',12],['DC',3,'Santé','Climat',-18]];
const promises={
'Économie':[['Baisse massive des impôts',8,-14,'Économie'],['Grand plan industriel',6,-6,'Économie'],['Réduction du déficit',-4,10,'Économie'],['Taxer les plus riches',5,-3,'Santé']],
'Santé':[['Couverture santé universelle',8,-15,'Santé'],['Baisse du prix des médicaments',6,-5,'Santé'],['Réforme modérée',3,2,'Santé']],
'Sécurité':[['10 000 policiers en plus',6,-5,'Sécurité'],['Prévention et justice locale',4,-2,'Santé'],['Tolérance zéro',5,-6,'Sécurité']],
'Immigration':[['Frontières renforcées',7,-6,'Immigration'],['Quotas de travail',4,0,'Immigration'],['Régularisation partielle',5,-7,'Santé']],
'Climat':[['Green New Deal',8,-14,'Climat'],['Transition énergétique progressive',5,-4,'Climat'],['Indépendance énergétique pétrole/gaz',5,-3,'Économie']]
};
const newsPool=[['Inflation en hausse','Économie',7,'Les ménages demandent une réponse claire sur les prix.'],['Crise hospitalière','Santé',8,'Les seniors et les familles exigent un plan santé.'],['Violences urbaines','Sécurité',8,'Les médias mettent la sécurité au premier plan.'],['Tensions à la frontière sud','Immigration',8,'Les États du Sud-Ouest deviennent nerveux.'],['Ouragan en Floride','Climat',7,'L’environnement et les infrastructures prennent de l’importance.'],['Chine: droits de douane','Économie',6,'Les ouvriers industriels écoutent vos propositions.'],['Cyberattaque étrangère','Sécurité',6,'Le leadership devient décisif.'],['Hausse du carburant','Économie',7,'Les zones rurales veulent des réponses.']];
const opponents=['Hawk Républicain','Nova Progressiste','Pierce Indépendant'];
let G;
function newGame(){G={turn:1,max:16,cash:120,ap:10,cred:58,trust:55,debate:55,staff:0,scandal:0,over:false,issues:Object.fromEntries(issues.map(x=>[x,20])),program:{},states:states.map(s=>({n:s[0],ev:s[1],a:s[2],b:s[3],lean:s[4],work:0,opp:0,poll:50-s[4]})),opps:opponents.map((n,i)=>({n,score:24+i*2,ev:0})),score:25,log:[],news:null,focus:null};makeNews();save();render();}
function load(){try{G=JSON.parse(localStorage.race270v4||'null')}catch(e){} if(!G)newGame();else render();}
function save(){localStorage.race270v4=JSON.stringify(G)}
function show(id,btn){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(btn)btn.classList.add('active');render()}
function spend(c){if(G.ap<c){modal('Actions insuffisantes','Il ne vous reste pas assez de points d’action.');return false}G.ap-=c;return true}
function clamp(x,a=3,b=97){return Math.max(a,Math.min(b,Math.round(x)))}
function makeNews(){let n=newsPool[Math.floor(Math.random()*newsPool.length)];G.news={title:n[0],issue:n[1],impact:n[2],txt:n[3]};issues.forEach(i=>G.issues[i]=clamp(15+Math.random()*18));G.issues[n[1]]=clamp(G.issues[n[1]]+n[2],10,45);G.focus=n[1]}
function addLog(t){G.log.unshift(t);if(G.log.length>60)G.log.pop()}
function promise(issue,idx){if(!spend(1))return;let p=promises[issue][idx];G.program[issue]=p[0];G.cred=clamp(G.cred+p[2]/2,0,100);G.trust=clamp(G.trust+(p[2]>0?2:-1),0,100);G.states.forEach(s=>{if(s.a==p[3]||s.b==p[3])s.work+=p[1]/2;if(s.a==issue||s.b==issue)s.work+=p[1]/3});addLog('Promesse: '+p[0]+' sur '+issue+'. Crédibilité '+(p[2]>=0?'+':'')+p[2]+'.');calc();render()}
function action(type){if(type=='meeting'){if(!spend(2))return;targetStates(2.2);addLog('Meeting ciblé dans les États pivots.')} if(type=='tv'){if(!spend(3)||G.cash<15)return;G.cash-=15;targetStates(3.2);G.score+=1;addLog('Publicité TV nationale et ciblage des swing states.')} if(type=='social'){if(!spend(1)||G.cash<4)return;G.cash-=4;G.score+=.8;G.trust=clamp(G.trust+1);addLog('Campagne réseaux sociaux efficace chez les jeunes.')} if(type=='fund'){if(!spend(1))return;G.cash+=24;G.trust=clamp(G.trust-2);addLog('Levée de fonds réussie. Les médias questionnent vos donateurs.')} if(type=='debate'){if(!spend(3))return;debate()} if(type=='scandal'){if(!spend(2)||G.cash<8)return;G.cash-=8;G.scandal=Math.max(0,G.scandal-12);G.trust=clamp(G.trust+4);addLog('Réponse de crise: votre équipe calme le scandale.')} if(type=='staff'){if(!spend(3)||G.cash<18)return;G.cash-=18;G.staff++;G.cred=clamp(G.cred+3);addLog('Nouveau conseiller recruté. Meilleure lecture des électeurs.')} calc();save();render()}
function targetStates(pow){let swing=G.states.filter(s=>Math.abs(s.poll-50)<8).sort((a,b)=>b.ev-a.ev).slice(0,7);swing.forEach(s=>s.work+=pow+G.staff*.3)}
function debate(){let hit=(G.debate+G.cred+G.trust)/3-50+Math.random()*18-9;if(hit>0){G.score+=2;targetStates(2);addLog('Débat réussi: vous gagnez en stature présidentielle.')}else{G.score-=2;G.trust=clamp(G.trust-3);addLog('Débat difficile: votre adversaire exploite vos contradictions.')}G.debate=clamp(G.debate+Math.random()*8-2)}
function ai(){G.opps.forEach((o,i)=>{let move=Math.random();if(move<.35){o.score+=1.1;G.states[Math.floor(Math.random()*G.states.length)].opp+=2;addLog(o.n+' lance une publicité d’attaque.')}else if(move<.7){o.score+=.8;let st=G.states.sort((a,b)=>Math.abs(a.poll-50)-Math.abs(b.poll-50))[i];if(st)st.opp+=2.5;addLog(o.n+' cible '+(st?st.n:'les swing states')+'.')}else{G.score-=.4;G.scandal+=3;addLog(o.n+' pousse une controverse médiatique contre vous.')}})}
function eventMaybe(){if(Math.random()<.35){let bad=Math.random()<.55;if(bad){G.scandal+=8;G.trust=clamp(G.trust-4);addLog('Scandale: un ancien message de campagne refait surface.')}else{G.cred=clamp(G.cred+5);G.score+=1.5;addLog('Soutien majeur: un gouverneur populaire vous rejoint.')}}}
function nextTurn(){if(G.turn>=G.max){election();return}ai();eventMaybe();G.turn++;G.ap=10+Math.min(3,G.staff);makeNews();calc();addLog('Nouveau briefing: '+G.news.title+'. Sujet dominant: '+G.news.issue+'.');save();render();show('brief')}
function calc(){let progBoost=0;Object.keys(G.program).forEach(k=>{if(k==G.focus)progBoost+=1.3;else progBoost+=.5});let national=25+(G.cred-50)*.08+(G.trust-50)*.08+progBoost-G.scandal*.06+G.score-25;G.score=clamp(national,5,60);G.states.forEach(s=>{let issue=0;if(G.program[s.a])issue+=3;if(G.program[s.b])issue+=2;let p=50-s.lean + (G.score-25)*.9 + s.work - s.opp + issue - G.scandal*.04 + Math.random()*2-1;s.poll=clamp(p,5,95)});document.getElementById('turn').textContent=G.turn+'/'+G.max;document.getElementById('cash').textContent=Math.round(G.cash);document.getElementById('ap').textContent=G.ap;document.getElementById('poll').textContent=Math.round(G.score)+'%'}
function election(){calc();let ours=0,opp=0,lines=[];G.states.forEach(s=>{let win=s.poll>=50;if(win)ours+=s.ev;else opp+=s.ev;lines.push(`<tr><td>${s.n}</td><td>${s.ev}</td><td>${win?'Vous':'Adversaire'}</td><td>${Math.round(s.poll)}%</td></tr>`)});G.over=true;save();modal(ours>=270?'Victoire présidentielle 🇺🇸':'Défaite électorale',`<p><b>${ours} GE</b> pour vous. Objectif: 270.</p><div class='log'><table><tr><th>État</th><th>GE</th><th>Gagnant</th><th>Score</th></tr>${lines.join('')}</table></div><button class='primary btn' onclick='newGame();closeModal()'>Nouvelle partie</button>`)}
function modal(t,b){document.getElementById('mt').innerHTML=t;document.getElementById('mb').innerHTML=b;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function render(){if(!G)return;calc();home();brief();program();campaign();polls();mapView();save()}
function home(){document.getElementById('home').innerHTML=`<div class='card'><h2>Votre campagne</h2><p class='sub'>Vous devez atteindre <b>270 grands électeurs</b>. Chaque tour commence par un brief: actualité, préoccupation dominante, États clés.</p><div class='row'><button class='primary btn' onclick='newGame()'>Nouvelle partie</button><button class='blue btn' onclick="show('brief')">Continuer</button></div></div><div class='card'><h2>Tableau de bord</h2><div class='grid2'><div><b>Crédibilité</b><div class='bar'><div class='fill' style='width:${G.cred}%'></div></div></div><div><b>Confiance</b><div class='bar'><div class='fill' style='width:${G.trust}%'></div></div></div></div><p class='sub'>Scandale: ${G.scandal} • Conseillers: ${G.staff}</p></div><div class='card log'><h2>Journal</h2>${G.log.map(x=>'<p>'+x+'</p>').join('')||'<p>Aucun événement.</p>'}</div>`}
function brief(){let sorted=Object.entries(G.issues).sort((a,b)=>b[1]-a[1]);let swing=G.states.filter(s=>Math.abs(s.poll-50)<6).sort((a,b)=>b.ev-a.ev).slice(0,6);document.getElementById('brief').innerHTML=`<div class='card news'><h2>Journal du tour ${G.turn}</h2><h3>${G.news.title}</h3><p>${G.news.txt}</p><p class='sub'>Sujet dominant: <b>${G.news.issue}</b></p></div><div class='card'><h2>Préoccupations des électeurs</h2>${sorted.map(x=>`<div class='meter'><span>${x[0]}</span><div class='bar' style='flex:1'><div class='fill' style='width:${x[1]}%'></div></div><b>${x[1]}%</b></div>`).join('<br>')}</div><div class='card'><h2>États clés</h2>${swing.map(s=>`<div class='state'><b>${s.n}</b> • ${s.ev} GE <span class='tiny'>${Math.round(s.poll)}% • enjeux: ${s.a}, ${s.b}</span></div>`).join('')}</div>`}
function program(){document.getElementById('program').innerHTML=`<div class='card'><h2>Promesses politiques</h2><p class='sub'>Chaque promesse coûte 1 action. Elle aide certains électeurs mais peut nuire à votre crédibilité budgétaire.</p>${issues.map(i=>`<h3>${i}</h3>${promises[i].map((p,idx)=>`<button class='choice' onclick="promise('${i}',${idx})"><b>${p[0]}</b><br><span class='tiny'>Impact électoral +${p[1]} • crédibilité ${p[2]}</span></button>`).join('')}<p class='tiny'>Choix actuel: ${G.program[i]||'aucun'}</p>`).join('')}</div>`}
function campaign(){document.getElementById('campaign').innerHTML=`<div class='card'><h2>Actions de campagne</h2><div class='row'><button class='btn blue' onclick="action('meeting')">Meeting ciblé<br><span class='tiny'>2 actions</span></button><button class='btn blue' onclick="action('tv')">Publicité TV<br><span class='tiny'>3 actions, 15 crédits</span></button><button class='btn blue' onclick="action('social')">Réseaux sociaux<br><span class='tiny'>1 action, 4 crédits</span></button><button class='btn gold' onclick="action('fund')">Lever des fonds<br><span class='tiny'>+24 crédits</span></button><button class='btn red' onclick="action('debate')">Débat télévisé<br><span class='tiny'>3 actions</span></button><button class='btn' onclick="action('scandal')">Répondre au scandale<br><span class='tiny'>2 actions, 8 crédits</span></button><button class='btn' onclick="action('staff')">Recruter conseiller<br><span class='tiny'>3 actions, 18 crédits</span></button><button class='btn primary' onclick='nextTurn()'>Finir le tour</button></div></div>`}
function polls(){let sorted=[...G.states].sort((a,b)=>Math.abs(a.poll-50)-Math.abs(b.poll-50)).slice(0,12);document.getElementById('polls').innerHTML=`<div class='card'><h2>Sondages nationaux</h2><table><tr><th>Candidat</th><th>Score</th></tr><tr><td>Vous</td><td>${Math.round(G.score)}%</td></tr>${G.opps.map(o=>`<tr><td>${o.n}</td><td>${Math.round(o.score)}%</td></tr>`).join('')}</table></div><div class='card'><h2>Swing states</h2>${sorted.map(s=>`<div class='state'><b>${s.n}</b> ${s.ev} GE <span class='tiny'>${Math.round(s.poll)}% pour vous • ${s.a}/${s.b}</span></div>`).join('')}</div>`}
function mapView(){let ours=G.states.filter(s=>s.poll>=50).reduce((a,s)=>a+s.ev,0);document.getElementById('map').innerHTML=`<div class='card'><h2>Carte électorale</h2><p class='sub'>Projection actuelle: <b>${ours} GE</b> / 270 nécessaires.</p><div class='map'>${G.states.map(s=>`<div class='box ${s.poll>=53?'win':s.poll<=47?'lose':'tie'}'><b>${s.n}</b><br>${s.ev}<br>${Math.round(s.poll)}%</div>`).join('')}</div></div>`}
load();
</script>
</body></html>
