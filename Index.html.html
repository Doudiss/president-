<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Race to 270 - V3</title>
<style>
:root{--bg:#0c1020;--card:#171d33;--card2:#202742;--txt:#f3f5ff;--muted:#aeb7d8;--accent:#6ea8ff;--good:#45d483;--bad:#ff6b6b;--warn:#ffd166}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#080b16,#111831);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;color:var(--txt)}header{position:sticky;top:0;z-index:5;background:rgba(12,16,32,.95);backdrop-filter:blur(10px);padding:12px 14px;border-bottom:1px solid #2a335a}h1{font-size:19px;margin:0}small{color:var(--muted)}main{padding:12px 12px 85px}.grid{display:grid;grid-template-columns:1fr;gap:10px}.card{background:var(--card);border:1px solid #2b355e;border-radius:18px;padding:14px;box-shadow:0 8px 20px #0004}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.pill{background:#263155;border:1px solid #3c4a7d;border-radius:999px;padding:6px 9px;font-size:12px;color:#dbe3ff}.btn{border:0;border-radius:14px;padding:11px 12px;background:var(--accent);color:#061022;font-weight:800;margin:4px 2px;cursor:pointer}.btn.secondary{background:#2c365e;color:var(--txt);border:1px solid #44558f}.btn.danger{background:#ff7878}.btn.good{background:#4cdf8a}.btn:disabled{opacity:.45}.bar{height:9px;background:#283155;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:var(--accent)}.bar.good span{background:var(--good)}.bar.bad span{background:var(--bad)}.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(12,16,32,.98);border-top:1px solid #2a335a;display:grid;grid-template-columns:repeat(5,1fr);padding:7px 5px env(safe-area-inset-bottom)}.tab{font-size:11px;text-align:center;padding:7px 2px;color:#b9c4e9;border-radius:12px}.tab.active{background:#233059;color:white}.hidden{display:none}.state{display:grid;grid-template-columns:42px 1fr 44px;gap:8px;align-items:center;padding:9px;border-radius:13px;background:#11182c;margin:6px 0;border:1px solid #29345b}.state b{font-size:13px}.map{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.tile{border-radius:10px;padding:8px 2px;text-align:center;font-size:11px;background:#2a3150;border:1px solid #3b4777}.leadYou{background:#173d2a}.leadOpp{background:#482326}.leadTie{background:#3a3454}.log{white-space:pre-wrap;line-height:1.35;color:#dce4ff;font-size:14px}.select{width:100%;padding:10px;border-radius:12px;background:#11182c;color:white;border:1px solid #3a4678;margin:5px 0}.metric{display:grid;grid-template-columns:1fr 52px;gap:8px;margin:8px 0}.headline{font-size:18px;font-weight:900}.result{font-size:28px;font-weight:900;text-align:center;margin:15px 0}.choice{background:#10172b;border:1px solid #34406c;border-radius:14px;padding:10px;margin:7px 0}.choice.selected{border-color:#6ea8ff;background:#182647}.news{border-left:4px solid var(--warn);padding-left:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(min-width:700px){main{max-width:900px;margin:auto}.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.map{grid-template-columns:repeat(10,1fr)}}
</style>
</head><body>
<header><h1>Race to 270 🇺🇸</h1><small>V3 — campagne présidentielle américaine</small></header>
<main>
<section id="home" class="view"></section>
<section id="brief" class="view hidden"></section>
<section id="program" class="view hidden"></section>
<section id="campaign" class="view hidden"></section>
<section id="polls" class="view hidden"></section>
<section id="map" class="view hidden"></section>
</main>
<nav class="tabs">
<div class="tab active" onclick="show('home')">Accueil</div><div class="tab" onclick="show('brief')">Briefing</div><div class="tab" onclick="show('program')">Promesses</div><div class="tab" onclick="show('campaign')">Actions</div><div class="tab" onclick="show('map')">Carte</div>
</nav>
<script>
const issues=['Économie','Santé','Sécurité','Immigration','Climat','Éducation'];
const states=[['CA',54,['Climat','Santé','Éducation']],['TX',40,['Économie','Immigration','Sécurité']],['FL',30,['Économie','Sécurité','Santé']],['NY',28,['Santé','Climat','Éducation']],['PA',19,['Économie','Santé','Sécurité']],['IL',19,['Santé','Éducation','Climat']],['OH',17,['Économie','Sécurité','Immigration']],['GA',16,['Économie','Santé','Éducation']],['NC',16,['Économie','Sécurité','Santé']],['MI',15,['Économie','Santé','Climat']],['NJ',14,['Santé','Éducation','Climat']],['VA',13,['Sécurité','Économie','Éducation']],['WA',12,['Climat','Éducation','Santé']],['AZ',11,['Immigration','Économie','Sécurité']],['MA',11,['Santé','Éducation','Climat']],['TN',11,['Sécurité','Économie','Immigration']],['IN',11,['Économie','Sécurité','Immigration']],['MD',10,['Santé','Éducation','Climat']],['MO',10,['Économie','Sécurité','Immigration']],['WI',10,['Économie','Santé','Éducation']],['CO',10,['Climat','Économie','Éducation']],['MN',10,['Santé','Économie','Éducation']],['SC',9,['Sécurité','Immigration','Économie']],['AL',9,['Sécurité','Économie','Immigration']],['LA',8,['Économie','Sécurité','Santé']],['KY',8,['Économie','Sécurité','Santé']],['OR',8,['Climat','Santé','Éducation']],['OK',7,['Énergie','Sécurité','Économie']],['CT',7,['Santé','Éducation','Économie']],['UT',6,['Économie','Sécurité','Immigration']],['IA',6,['Économie','Santé','Éducation']],['NV',6,['Économie','Immigration','Santé']],['AR',6,['Sécurité','Économie','Santé']],['MS',6,['Santé','Sécurité','Économie']],['KS',6,['Économie','Sécurité','Éducation']],['NM',5,['Immigration','Santé','Climat']],['NE',5,['Économie','Sécurité','Agriculture']],['ID',4,['Économie','Immigration','Sécurité']],['WV',4,['Économie','Santé','Sécurité']],['HI',4,['Climat','Santé','Économie']],['NH',4,['Économie','Santé','Éducation']],['ME',4,['Santé','Climat','Économie']],['MT',4,['Économie','Sécurité','Climat']],['RI',4,['Santé','Éducation','Climat']],['DE',3,['Santé','Économie','Éducation']],['SD',3,['Économie','Agriculture','Sécurité']],['ND',3,['Énergie','Économie','Sécurité']],['AK',3,['Énergie','Sécurité','Économie']],['VT',3,['Climat','Santé','Éducation']],['WY',3,['Énergie','Économie','Sécurité']],['DC',3,['Éducation','Santé','Climat']]];
const promiseOptions={
'Économie':[['Baisse forte des impôts',-18,8,-8],['Baisse modérée des impôts',-8,5,-2],['Plan industrie et emplois',-12,8,1],['Hausse impôts hauts revenus',8,3,4]],
'Santé':[['Couverture publique universelle',-22,10,-8],['Renforcer Medicare',-10,7,0],['Système mixte privé/public',-4,4,4],['Réduire dépenses santé',8,-5,8]],
'Sécurité':[['20 000 policiers',-12,8,-2],['Police + prévention',-8,6,3],['Réforme de la police',-5,3,2],['Ligne très dure',-6,7,-5]],
'Immigration':[['Mur et expulsions',-8,8,-8],['Frontières + visas ciblés',-5,6,3],['Régularisation partielle',-6,3,2],['Ouverture élargie',-10,1,-6]],
'Climat':[['Green New Deal',-25,10,-10],['Transition réaliste',-10,7,3],['Investir énergie nucléaire',-8,5,4],['Priorité pétrole/gaz',4,3,-5]],
'Éducation':[['Université moins chère',-14,8,-3],['Écoles publiques renforcées',-10,7,1],['Chèque éducation',-6,4,3],['Réduction programmes fédéraux',7,-3,6]]
};
const events=['Inflation en hausse','Crise bancaire régionale','Ouragan en Floride','Tensions internationales','Scandale de financement','Grève des enseignants','Baisse du chômage','Explosion du prix du carburant','Cyberattaque nationale','Bonne croissance trimestrielle'];
let game;
function newGame(){game={turn:1,maxTurn:16,budget:120,pa:6,cred:60,pop:48,media:50,momentum:0,history:[],program:{},concerns:{},stateScore:{},log:'Bienvenue candidat. Objectif : 270 grands électeurs.',event:''};issues.forEach((x,i)=>game.program[x]=promiseOptions[x][1]);states.forEach(s=>game.stateScore[s[0]]=50+(Math.random()*10-5));rollBrief();save();renderAll();}
function save(){localStorage.setItem('race270v3',JSON.stringify(game))}function load(){game=JSON.parse(localStorage.getItem('race270v3')||'null');if(!game)newGame();else renderAll()}
function rollBrief(){let weights=issues.map(i=>[i,10+Math.floor(Math.random()*25)]);let sum=weights.reduce((a,b)=>a+b[1],0);game.concerns={};weights.forEach(w=>game.concerns[w[0]]=Math.round(w[1]*100/sum));game.event=events[Math.floor(Math.random()*events.length)];applyEvent();}
function applyEvent(){let e=game.event,delta=0;if(e.includes('Inflation')||e.includes('carburant'))delta=issueMatch('Économie')-3;if(e.includes('Ouragan'))delta=issueMatch('Climat')-2;if(e.includes('Scandale')){game.cred-=7;delta=-3}if(e.includes('enseignants'))delta=issueMatch('Éducation')-1;if(e.includes('chômage')||e.includes('croissance'))delta=issueMatch('Économie')+2;if(e.includes('Cyber'))delta=issueMatch('Sécurité')-1;if(e.includes('Tensions'))delta=issueMatch('Sécurité')-1;game.momentum+=delta;game.pop+=Math.round(delta/2)}
function issueMatch(issue){let chosen=game.program[issue];return Math.round((chosen[2]||0)/2)}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event?.target?.classList?.add('active');renderAll()}
function geProjection(){let you=0,opp=0,tie=0;states.forEach(s=>{let sc=statePoll(s); if(sc>50.5)you+=s[1]; else if(sc<49.5)opp+=s[1]; else tie+=s[1];});return{you,opp,tie}}
function statePoll(s){let base=game.stateScore[s[0]]+game.momentum*0.6+(game.pop-50)*0.25+(game.cred-55)*0.18; s[2].forEach(is=>{base+=(game.program[is]?.[2]||0)*game.concerns[is]/100}); return Math.max(35,Math.min(65,base));}
function action(type,cost){if(game.pa<cost)return;game.pa-=cost;if(type==='meeting'){game.pop+=2;game.budget-=5;boostSwing(1.5);addLog('Meeting réussi : popularité +2, swing states renforcés.')}if(type==='tv'){game.budget-=18;game.media+=5;game.pop+=2;boostSwing(2);addLog('Spot TV national : image médiatique +5.')}if(type==='fund'){game.budget+=35;game.cred-=2;addLog('Levée de fonds : budget +35M, crédibilité -2.')}if(type==='attack'){game.pop+=1;game.cred-=3;game.momentum+=2;addLog('Attaque contre l’adversaire : momentum +2, crédibilité -3.')}if(type==='debate'){debate()}if(type==='door'){game.budget-=8;boostSwing(3);addLog('Porte-à-porte ciblé : progression dans les États serrés.')}if(type==='crisis'){game.cred+=4;game.media+=3;addLog('Réponse présidentielle à la crise : crédibilité +4.')}clamp();save();renderAll()}
function boostSwing(v){states.forEach(s=>{let p=statePoll(s); if(Math.abs(p-50)<4)game.stateScore[s[0]]+=v;});}
function debate(){let r=Math.random()*100 + game.cred*.6 + game.pop*.4; if(r>85){game.momentum+=5;game.cred+=3;addLog('Débat gagné nettement : momentum +5.')}else if(r>60){game.momentum+=2;addLog('Débat correct : momentum +2.')}else{game.momentum-=4;game.cred-=4;addLog('Débat raté : momentum -4, crédibilité -4.')}}
function setPromise(issue,idx){game.program[issue]=promiseOptions[issue][idx];calcBudgetCred();save();renderAll()}
function calcBudgetCred(){let cost=0,cred=70;issues.forEach(i=>{cost+=game.program[i][1];cred+=game.program[i][3];});game.cred=Math.max(20,Math.min(90,cred - Math.max(0,-cost-55)/3));}
function nextTurn(){if(game.turn>=game.maxTurn){election();return}game.turn++;game.pa=6;game.budget+=15;game.momentum*=0.65;rollBrief();addLog('--- Tour '+game.turn+' ---\nNouvelle actualité : '+game.event);clamp();save();renderAll();show('brief')}
function election(){let you=0,opp=0,won=[];states.forEach(s=>{let p=statePoll(s)+(Math.random()*6-3); if(p>=50){you+=s[1];won.push(s[0])}else opp+=s[1];});let res=you>=270?'VICTOIRE':'DÉFAITE';game.log=`${res} — Vous obtenez ${you} GE contre ${opp}.\nÉtats remportés : ${won.join(', ')}`;save();renderAll();show('home')}
function addLog(x){game.log=x+'\n\n'+game.log.slice(0,1200)}function clamp(){['cred','pop','media'].forEach(k=>game[k]=Math.max(0,Math.min(100,Math.round(game[k]))));game.budget=Math.round(game.budget)}
function renderAll(){if(!game)return;let ge=geProjection();home.innerHTML=`<div class="grid"><div class="card wide"><div class="headline">Tour ${game.turn}/${game.maxTurn}</div><div class="row"><span class="pill">Budget ${game.budget}M$</span><span class="pill">Actions ${game.pa}</span><span class="pill">Projection ${ge.you} GE</span></div><br><div class="result">${ge.you>=270?'En tête vers la Maison-Blanche':'Objectif : 270 GE'}</div><button class="btn good" onclick="nextTurn()">Tour suivant</button><button class="btn secondary" onclick="newGame()">Nouvelle partie</button></div><div class="card"><b>Indicateurs</b>${metric('Popularité',game.pop)}${metric('Crédibilité',game.cred)}${metric('Médias',game.media)}${metric('Momentum',Math.round(50+game.momentum*5))}</div><div class="card"><b>Journal</b><div class="log">${game.log}</div></div></div>`;
brief.innerHTML=`<div class="grid"><div class="card wide news"><div class="headline">Briefing du matin</div><p><b>Actualité :</b> ${game.event}</p><p><b>Conseiller :</b> adaptez votre message au premier sujet du pays.</p></div><div class="card"><b>Préoccupations nationales</b>${issues.map(i=>metric(i,game.concerns[i])).join('')}</div><div class="card"><b>États clés</b>${swingStates().map(s=>`<div class="state"><b>${s[0]}</b><div>${s[2].join(' / ')}<br><small>Sondage vous : ${statePoll(s).toFixed(1)}%</small></div><b>${s[1]}</b></div>`).join('')}</div></div>`;
program.innerHTML=`<div class="card"><div class="headline">Promesses et programme</div><small>Chaque promesse change le coût, la crédibilité et les électeurs sensibles au sujet.</small>${issues.map(issue=>`<h3>${issue}</h3>${promiseOptions[issue].map((o,idx)=>`<div class="choice ${game.program[issue][0]===o[0]?'selected':''}" onclick="setPromise('${issue}',${idx})"><b>${o[0]}</b><br><small>Coût: ${o[1]}Mds | Impact électeurs: ${o[2]} | Crédibilité: ${o[3]}</small></div>`).join('')}`).join('')}</div>`;
campaign.innerHTML=`<div class="card"><div class="headline">Actions de campagne</div><p>Points d'action restants : <b>${game.pa}</b> | Budget : <b>${game.budget}M$</b></p><div class="two"><button class="btn" onclick="action('meeting',1)">Meeting local<br><small>1 PA / 5M$</small></button><button class="btn" onclick="action('tv',2)">Spot TV<br><small>2 PA / 18M$</small></button><button class="btn" onclick="action('door',2)">Porte-à-porte<br><small>2 PA / 8M$</small></button><button class="btn" onclick="action('fund',1)">Lever fonds<br><small>1 PA / +35M$</small></button><button class="btn" onclick="action('attack',2)">Attaquer<br><small>2 PA</small></button><button class="btn" onclick="action('debate',3)">Débat TV<br><small>3 PA</small></button><button class="btn secondary" onclick="action('crisis',2)">Répondre crise<br><small>2 PA</small></button></div></div>`;
polls.innerHTML='';
map.innerHTML=`<div class="card wide"><div class="headline">Carte électorale</div><p>Vous : <b>${ge.you}</b> GE | Adversaire : <b>${ge.opp}</b> GE | Serrés : <b>${ge.tie}</b></p><div class="map">${states.map(s=>{let p=statePoll(s);let c=p>50.5?'leadYou':p<49.5?'leadOpp':'leadTie';return `<div class="tile ${c}"><b>${s[0]}</b><br>${s[1]}<br>${p.toFixed(0)}%</div>`}).join('')}</div></div>`;}
function metric(label,val){val=Math.max(0,Math.min(100,Math.round(val||0)));return `<div class="metric"><div><small>${label}</small><div class="bar"><span style="width:${val}%"></span></div></div><b>${val}%</b></div>`}
function swingStates(){return [...states].sort((a,b)=>Math.abs(statePoll(a)-50)-Math.abs(statePoll(b)-50)).slice(0,8)}
load();
</script>
</body></html>
